openapi: 3.0.3
info:
  title: Payment Processing API
  version: 1.0.0

paths:
  /api/payments/process:
    post:
      summary: Process a payment
      operationId: processPayment
      parameters:
        - name: userId
          in: query
          required: true
          schema:
            type: string
        - name: cardNumber
          in: query
          required: true
          schema:
            type: string
            pattern: '^\d{16}$'
        - name: amount
          in: query
          required: true
          schema:
            type: number
            minimum: 0.01
            maximum: 10000
        - name: currency
          in: query
          required: true
          schema:
            type: string
            enum: [USD, EUR, GBP, UAH, PLN]
      responses:
        '200':
          description: Payment processed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentResponse'
        '400':
          description: Invalid request
        '402':
          description: Payment declined
        '422':
          description: Fraud detected

  /api/payments/history:
    get:
      summary: Get payment history
      operationId: getPaymentHistory
      parameters:
        - name: userId
          in: query
          required: true
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 20
        - name: fromDate
          in: query
          schema:
            type: string
            format: date
        - name: toDate
          in: query
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Payment history
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentHistoryResponse'
        '403':
          description: Access denied

  /api/payments/{paymentId}:
    get:
      summary: Get payment by ID
      operationId: getPaymentById
      parameters:
        - name: paymentId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Payment details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentResponse'
        '404':
          description: Payment not found
        '403':
          description: Access denied

  /api/payments/refund:
    post:
      summary: Refund a payment
      operationId: refundPayment
      parameters:
        - name: paymentId
          in: query
          required: true
          schema:
            type: string
        - name: amount
          in: query
          required: true
          schema:
            type: number
            minimum: 0.01
      responses:
        '200':
          description: Refund processed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RefundResponse'
        '400':
          description: Invalid refund amount
        '404':
          description: Payment not found
        '409':
          description: Refund amount exceeds original payment

  /api/payments/void:
    post:
      summary: Void a payment
      operationId: voidPayment
      parameters:
        - name: paymentId
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Payment voided
        '404':
          description: Payment not found
        '409':
          description: Payment cannot be voided

components:
  schemas:
    PaymentResponse:
      type: object
      properties:
        paymentId:
          type: string
        status:
          type: string
          enum: [SUCCESS, REJECTED, PENDING, VOIDED]
        amount:
          type: number
        currency:
          type: string
        createdAt:
          type: string
          format: date-time

    PaymentHistoryResponse:
      type: object
      properties:
        payments:
          type: array
          items:
            $ref: '#/components/schemas/PaymentResponse'
        totalElements:
          type: integer
        totalPages:
          type: integer

    RefundResponse:
      type: object
      properties:
        refundId:
          type: string
        originalPaymentId:
          type: string
        amount:
          type: number
        status:
          type: string
